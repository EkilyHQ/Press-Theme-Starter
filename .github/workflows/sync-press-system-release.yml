name: Sync Press System Release

on:
  repository_dispatch:
    types:
      - press-system-release
  workflow_dispatch:
    inputs:
      tag:
        description: Press release tag to record, for example v3.4.0. Leave empty for latest.
        required: false
  schedule:
    - cron: '29 4 * * *'

permissions:
  contents: write

concurrency:
  group: sync-press-system-release
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      PRESS_REPOSITORY: ${{ vars.PRESS_REPOSITORY || 'EkilyHQ/Press' }}
      INPUT_TAG: ${{ inputs.tag }}
      DISPATCH_TAG: ${{ github.event.client_payload.tag }}
      DISPATCH_ASSET_NAME: ${{ github.event.client_payload.asset_name }}
      DISPATCH_ASSET_SIZE: ${{ github.event.client_payload.asset_size }}
      DISPATCH_ASSET_SHA256: ${{ github.event.client_payload.asset_sha256 }}
      DISPATCH_VERSION: ${{ github.event.client_payload.version }}
      DISPATCH_UPGRADE_FROM_JSON: ${{ toJSON(github.event.client_payload.upgrade_from) }}
      DISPATCH_RELEASE_INTENT_SOURCE: ${{ github.event.client_payload.release_intent.source }}
      PRESS_RELEASE_TOKEN: ${{ secrets.PRESS_RELEASE_TOKEN || github.token }}
    steps:
      - name: Checkout theme starter
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.18.0'

      - name: Resolve Press release
        id: release
        env:
          GH_TOKEN: ${{ secrets.PRESS_RELEASE_TOKEN || github.token }}
        run: |
          set -euo pipefail
          mkdir -p dist
          tag="${INPUT_TAG:-${DISPATCH_TAG:-}}"
          if [[ -n "${tag}" ]]; then
            gh api "repos/${PRESS_REPOSITORY}/releases/tags/${tag}" > dist/press-release.json
          else
            gh api "repos/${PRESS_REPOSITORY}/releases/latest" > dist/press-release.json
          fi

          release_tag="$(node -p "require('./dist/press-release.json').tag_name || ''")"
          payload_intent_source="${DISPATCH_RELEASE_INTENT_SOURCE:-}"
          canonical_intent_source=""
          if [[ -n "${release_tag}" ]]; then
            canonical_intent_source="https://raw.githubusercontent.com/${PRESS_REPOSITORY}/release-artifacts/${release_tag}/release-intent.json"
          fi
          if [[ -n "${payload_intent_source}" && "${payload_intent_source}" != "${canonical_intent_source}" ]]; then
            echo "dispatch release_intent.source must match ${canonical_intent_source}" >&2
            exit 1
          fi

          if [[ -n "${canonical_intent_source}" ]]; then
            if curl --fail-with-body --location --silent --show-error \
              --header "Authorization: Bearer ${PRESS_RELEASE_TOKEN}" \
              --output dist/release-intent.json \
              "${canonical_intent_source}"; then
              echo "Resolved Press release intent ${canonical_intent_source}."
            else
              rm -f dist/release-intent.json
              echo "canonical release intent ${canonical_intent_source} could not be fetched; legacy GitHub release metadata fallback has been sunset." >&2
              exit 1
            fi
          fi

          PRESS_TARGET_REPOSITORY="${GITHUB_REPOSITORY}" \
          PRESS_RELEASE_TARGET_CATEGORY="downstream" \
          PRESS_RELEASE_TARGET_REF="main" \
          PRESS_RELEASE_TARGET_PATH="press-system-release.json" \
          PRESS_RELEASE_TARGET_TYPE="press-release-marker" \
          PRESS_RELEASE_TARGET_RECONCILER="theme-starter-marker-sync" \
          node scripts/resolve-press-system-release.js \
            --release dist/press-release.json \
            --release-intent dist/release-intent.json \
            --out dist/press-release-env.txt

          while IFS='=' read -r key value; do
            [[ -n "${key}" ]] || continue
            echo "${key}=${value}" >> "${GITHUB_OUTPUT}"
          done < dist/press-release-env.txt

      - name: Update Press release marker
        env:
          PRESS_RELEASE_JSON: dist/press-release.json
          PRESS_ASSET_NAME: ${{ steps.release.outputs.asset_name }}
          PRESS_ASSET_URL: ${{ steps.release.outputs.asset_url }}
          PRESS_ASSET_SIZE: ${{ steps.release.outputs.asset_size }}
          PRESS_ASSET_SHA256: ${{ steps.release.outputs.asset_sha256 }}
          PRESS_SYSTEM_VERSION: ${{ steps.release.outputs.version }}
          PRESS_SYSTEM_TAG: ${{ steps.release.outputs.tag }}
          PRESS_UPGRADE_FROM_JSON: ${{ steps.release.outputs.upgrade_from_json }}
          PRESS_RELEASE_INTENT_SOURCE: ${{ steps.release.outputs.release_intent_source }}
        run: |
          set -euo pipefail
          node scripts/sync-press-system-release.js

      - name: Write Press system lock
        run: |
          set -euo pipefail
          node scripts/write-press-system-lock.js \
            --release-env dist/press-release-env.txt \
            --marker press-system-release.json \
            --out press-system-lock.json \
            --repository "${GITHUB_REPOSITORY}" \
            --category downstream \
            --ref main \
            --path press-system-release.json \
            --observed-type press-release-marker \
            --reconciler theme-starter-marker-sync

      - name: Validate sync workflow
        run: |
          bash scripts/test-press-system-release-sync.sh

      - name: Commit and push marker
        run: |
          set -euo pipefail
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "Press system release marker is already current."
            exit 0
          fi

          tag="$(node -p "require('./press-system-release.json').tag")"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add press-system-release.json press-system-lock.json
          git commit -m "Sync Press system release ${tag}"
          git pull --rebase origin main
          git push origin HEAD:main
